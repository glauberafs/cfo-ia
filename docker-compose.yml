services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cfo
      POSTGRES_PASSWORD: cfo
      POSTGRES_DB: cfo_ia
    ports:
      - "5432:5432"
    volumes:
      - cfo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cfo_pg_data:
